<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soham Waghmare — CV</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Mono:wght@300;400;500&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F0EAD6;
    --navy: #00416A;
    --navy-light: #005a8e;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--cream);
    color: var(--navy);
    font-family: 'DM Mono', monospace;
    font-size: 14px;
    line-height: 1.6;
    padding: 2rem 1.5rem 4rem;
    max-width: 860px;
    margin: 0 auto;
  }

  /* ── PANEL ── */
  .panel {
    background: var(--cream);
    border: 2.5px solid var(--navy);
    margin-bottom: 1.4rem;
    padding: 1.8rem 2rem;
    position: relative;
    opacity: 0;
    transform: scale(0.93) translateY(18px);
    transition: transform 0.22s ease, box-shadow 0.22s ease;
    /* entrance handled by JS */
  }
  .panel.visible {
    opacity: 1;
    transform: scale(1) translateY(0);
  }
  .panel:hover {
    transform: scale(1) translateY(-5px);
    box-shadow: 8px 8px 0 var(--navy);
    z-index: 2;
  }
  .panel:hover h2 {
    transform: rotate(0deg);
  }

  /* ── SECTION LABEL ── */
  h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.72rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--cream);
    background: var(--navy);
    display: inline-block;
    padding: 3px 10px;
    margin-bottom: 1.1rem;
    transform: rotate(-1.2deg);
    transform-origin: left center;
    transition: transform 0.2s ease;
  }

  /* ── INFO PANEL ── */
  .info-grid {
    display: grid;
    grid-template-columns: 140px 1fr;
    gap: 1.5rem;
    align-items: start;
  }
  .photo-wrap {
    width: 130px;
    height: 160px;
    border: 2.5px solid var(--navy);
    overflow: hidden;
    flex-shrink: 0;
    transition: transform 0.22s ease, box-shadow 0.22s ease;
    cursor: pointer;
  }
  .photo-wrap:hover {
    transform: translateY(-4px);
    box-shadow: 5px 5px 0 var(--navy);
  }
  .photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
  }
  .info-details {}
  .info-name {
    font-family: 'Playfair Display', serif;
    font-size: 2rem;
    font-weight: 900;
    line-height: 1.1;
    margin-bottom: 0.8rem;
  }
  .info-row {
    display: flex;
    align-items: baseline;
    gap: 0.5rem;
    margin-bottom: 0.3rem;
    font-size: 0.82rem;
  }
  .info-label {
    font-weight: 500;
    color: var(--navy);
    opacity: 0.55;
    min-width: 60px;
    text-transform: uppercase;
    font-size: 0.68rem;
    letter-spacing: 0.1em;
  }
  .info-row a {
    color: var(--navy);
    text-decoration: none;
    border-bottom: 1.5px solid var(--navy);
    transition: opacity 0.15s;
  }
  .info-row a:hover { opacity: 0.6; }

  /* ── PORTFOLIO BOX ── */
  .portfolio-box {
    margin-top: 1.2rem;
    border: 2px solid var(--navy);
    padding: 0.75rem 1.2rem;
    display: inline-flex;
    align-items: center;
    gap: 0.7rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 0.12em;
    color: var(--navy);
    text-decoration: none;
    transition: background 0.18s ease, color 0.18s ease, transform 0.18s ease, box-shadow 0.18s ease;
    position: relative;
    overflow: hidden;
  }
  .portfolio-box::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--navy);
    transform: translateX(-100%);
    transition: transform 0.22s ease;
    z-index: 0;
  }
  .portfolio-box:hover::before { transform: translateX(0); }
  .portfolio-box:hover { color: var(--cream); box-shadow: 4px 4px 0 var(--navy-light); transform: translateY(-2px); }
  .portfolio-box span { position: relative; z-index: 1; }
  .portfolio-box .arrow { position: relative; z-index: 1; font-size: 1.2rem; }

  /* ── ABOUT ── */
  .about-text {
    font-size: 0.9rem;
    line-height: 1.75;
  }

  /* ── SKILLS ── */
  .skills-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 0.5rem;
  }
  .skill-tag {
    border: 1.5px solid var(--navy);
    padding: 4px 12px;
    font-size: 0.78rem;
    font-family: 'DM Mono', monospace;
    font-weight: 500;
    letter-spacing: 0.05em;
    transition: background 0.15s, color 0.15s;
  }
  .skill-tag:hover { background: var(--navy); color: var(--cream); }

  /* ── I MAKE / WHAT I DELIVER ── */
  .two-col {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.3rem 2rem;
    font-size: 0.83rem;
  }
  .list-item {
    padding: 0.2rem 0;
    border-bottom: 1px solid rgba(0,65,106,0.15);
  }
  .list-item::before {
    content: '→ ';
    opacity: 0.4;
  }

  /* ── HIGHLIGHTS ── */
  .highlight-item {
    margin-bottom: 2.2rem;
  }
  .highlight-item:last-child { margin-bottom: 0; }
  .highlight-img-wrap {
    display: inline-block;
    border: 2.5px solid var(--navy);
    margin-bottom: 0.9rem;
    transition: transform 0.22s ease, box-shadow 0.22s ease;
    cursor: pointer;
    max-width: 100%;
  }
  .highlight-img-wrap:hover {
    transform: translateY(-5px);
    box-shadow: 7px 7px 0 var(--navy);
  }
  .highlight-img-wrap img {
    display: block;
    max-width: 100%;
    height: auto;
  }
  .highlight-text {
    font-size: 0.95rem;
    line-height: 1.7;
    max-width: 640px;
  }

  /* ── QUOTE ── */
  .quote-block {
    text-align: center;
    padding: 1.2rem 0;
  }
  .quote-block blockquote {
    font-family: 'Playfair Display', serif;
    font-size: 1.3rem;
    font-weight: 700;
    color: var(--navy);
    font-style: italic;
    line-height: 1.4;
  }

  /* ── EXPLORE LINK ── */
  .explore-link {
    display: inline-block;
    color: var(--navy);
    font-size: 0.85rem;
    margin-top: 0.8rem;
    border-bottom: 1.5px solid var(--navy);
    text-decoration: none;
    transition: opacity 0.15s;
  }
  .explore-link:hover { opacity: 0.55; }

  /* ── WHY HIRE ── */
  .why-list {
    display: flex;
    flex-direction: column;
    gap: 0.55rem;
    font-size: 0.85rem;
  }
  .why-item {
    padding: 0.6rem 0.9rem;
    border-left: 3px solid var(--navy);
    background: rgba(0,65,106,0.04);
    line-height: 1.55;
  }

  @media (max-width: 600px) {
    .info-grid { grid-template-columns: 1fr; }
    .photo-wrap { width: 110px; height: 140px; }
    .two-col { grid-template-columns: 1fr; }
    .info-name { font-size: 1.5rem; }
  }
</style>
</head>
